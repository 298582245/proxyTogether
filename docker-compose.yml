version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:5.7
    container_name: proxy-together-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: proxy_together
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sqls:/docker-entrypoint-initdb.d:ro
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: proxy-together-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: proxy-together-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=proxy_together
      - DB_USER=root
      - DB_PASSWORD=${DB_ROOT_PASSWORD:-root123456}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    volumes:
      - ./server/.env:/app/.env:ro
      - jwt_keys:/app/keys
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: proxy-together-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  jwt_keys:
